name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 1. تثبيت pnpm أولاً
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 2. إعداد Node.js مع التخزين المؤقت
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. بناء ملفات الويب وعمل المزامنة
      - name: Build Web & Sync Capacitor
        run: |
          pnpm build
          npx cap sync android

      # 4. بناء الأندرويد (نسخة Debug لكي تعمل فوراً على الموبايل)
      - name: Build Android app
        run: |
          ANDROID_DIR=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          if [ -z "$ANDROID_DIR" ]; then
            echo "Error: Could not find android directory with gradlew"
            exit 1
          fi
          echo "Building in: $ANDROID_DIR"
          cd "$ANDROID_DIR"
          chmod +x gradlew
          # التغيير هنا: استخدمنا assembleDebug بدلاً من assembleRelease
          ./gradlew assembleDebug

      # 5. رفع الـ APK (سيكون الملف باسم app-debug.apk وهو صالح للتثبيت)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          
