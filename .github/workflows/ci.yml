name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 1. إعداد pnpm أولاً بدون إصدار محدد لتجنب التعارض
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 2. إعداد Node.js مع التخزين المؤقت
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. البحث عن مجلد أندرويد وبنائه تلقائياً لتجنب خطأ "No such file"
      - name: Build Android app
        run: |
          # هذا الأمر سيبحث عن المجلد الذي يحتوي على ملف gradlew ويقوم بالبناء فيه
          ANDROID_DIR=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          echo "Found Android directory at: $ANDROID_DIR"
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # استخدام النجمة المزدوجة للبحث عن الـ APK في أي مكان تم إنشاؤه فيه
          path: "**/build/outputs/apk/release/*.apk"
          
