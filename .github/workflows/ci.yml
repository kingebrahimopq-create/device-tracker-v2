name: CI / build-and-test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # تثبيت pnpm قبل setup-node حتى يتوفر الأمر pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9   # أو أحدث، يمكنك تحديد رقم الإصدار الذي تريده

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm   # هذا سيخزن مجلد cache pnpm تلقائيًا

      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
