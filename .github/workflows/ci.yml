name: CI / Build Android APK (Capacitor)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تثبيت pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 3. تثبيت Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 4. تثبيت الاعتماديات
      - name: Install dependencies
        run: pnpm install

      # 5. بناء مشروع الويب (إذا كان هناك script build)
      #    تأكد من أن package.json يحتوي على script "build"
      - name: Build web project
        run: pnpm build

      # 6. مزامنة Capacitor مع نظام Android الأساسي
      #    هذا الأمر سينشئ/يحدث ملفات مثل capacitor.settings.gradle
      - name: Sync Capacitor with Android
        run: npx cap sync android

      # 7. إعداد Java JDK
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 8. بناء APK باستخدام Gradle
      - name: Build Android app
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 9. رفع APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
