name: CI / Build Android APK (Capacitor)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      # تأكد من وجود script build في package.json
      - run: pnpm build

      # تثبيت Capacitor CLI إذا لم يكن موجوداً
      - name: Ensure Capacitor CLI is installed
        run: pnpm add -D @capacitor/cli

      # مزامنة Capacitor مع Android
      - name: Sync Capacitor with Android
        run: pnpm exec cap sync android

      # إعداد Java وبناء Android
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android app
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
